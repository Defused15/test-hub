<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Hub · Test Dashboard</title>
<meta name="description" content="Combined QA test report dashboard — all projects, all results.">
<meta name="theme-color" content="#1a1814">
<meta property="og:title" content="QA Hub · Test Dashboard">
<meta property="og:description" content="Combined QA test report dashboard — all projects, all results.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://qa.rcastillo.dev/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="QA Hub · Test Dashboard">
<meta name="twitter:description" content="Combined QA test report dashboard — all projects, all results.">
<!-- Critical inline styles — prevents FOUT/CLS while async CSS loads -->
<style>
  @font-face{font-family:'DM Sans Fallback';src:local('Arial');size-adjust:100%;ascent-override:94%;descent-override:24%;line-gap-override:0%}
  @font-face{font-family:'DM Mono Fallback';src:local('Courier New');size-adjust:105%;ascent-override:88%;descent-override:22%;line-gap-override:0%}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:15px}
  body{background:#faf9f7;color:#1a1814;font-family:'DM Sans','DM Sans Fallback',sans-serif;line-height:1.5;min-height:100vh}
  .page{max-width:1120px;margin:0 auto;padding:52px 36px 80px}
  .header{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:24px;border-bottom:1.5px solid #1a1814;margin-bottom:36px}
  h1{font-size:26px;font-weight:300;letter-spacing:-.02em}
  h1 strong{font-weight:600}
  .eyebrow{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6b6560;margin-bottom:4px}
</style>
<!-- Preconnect to shorten the font request chain -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Non-blocking Google Fonts -->
<link rel="preload" as="style"
  href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400&display=swap"
  onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400&display=swap">
</noscript>
<!-- Non-blocking stylesheet -->
<link rel="preload" as="style" href="style.css"
  onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="style.css"></noscript>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
<link rel="manifest" href="site.webmanifest">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>
</head>
<body>
<main class="page">

  <header class="header">
    <div>
      <div class="eyebrow">QA Hub · Combined Test Report</div>
      <h1><strong>All Projects</strong> Dashboard</h1>
    </div>
    <div class="header-meta">
      <span class="mono" id="gen-date"></span>
      <span class="pill ok" id="global-pill"><span class="dot"></span><span id="pill-text">All passed</span></span>
    </div>
  </header>

  <div class="sl">Global Summary</div>
  <div class="gstats" id="gstats"></div>

  <div class="sl">Projects</div>
  <div class="type-filter" id="card-type-filter" style="display:none">
    <button class="fbtn active all" data-type="all">All</button>
    <button class="fbtn all" data-type="playwright">E2E</button>
    <button class="fbtn all" data-type="jest">Unit</button>
    <button class="fbtn all" data-type="newman">API</button>
  </div>
  <div class="cards" id="cards"></div>

  <div class="sl" id="trends-sl" style="display:none">Trends</div>
  <div class="charts-grid" id="trends-grid" style="display:none">
    <div class="chart-card">
      <div class="chart-title">Pass Rate Trend</div>
      <canvas id="chart-passrate" height="180"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Duration Trend</div>
      <canvas id="chart-duration" height="180"></canvas>
    </div>
  </div>

  <div class="sl" id="heatmap-sl" style="display:none">Reliability Heatmap</div>
  <div id="heatmap-wrap" style="display:none"></div>

  <div class="sl">Rankings</div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Top 5 Flaky Tests</div>
      <canvas id="chart-flaky" height="180"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top 5 Slowest Tests</div>
      <canvas id="chart-slowest" height="180"></canvas>
    </div>
  </div>

  <div class="sl">All Tests</div>
  <div class="table-wrap">
    <div class="table-controls">
      <div class="filter-btns" id="filter-btns">
        <button class="fbtn active all" data-filter="all">All</button>
        <button class="fbtn pass" data-filter="expected">Passed</button>
        <button class="fbtn fail" data-filter="unexpected">Failed</button>
        <button class="fbtn flaky" data-filter="flaky">Flaky</button>
        <button class="fbtn skip" data-filter="skipped">Skipped</button>
        <span class="filter-sep" id="type-sep" style="display:none"></span>
        <button class="fbtn active all" data-ttype="all" style="display:none">All types</button>
        <button class="fbtn all" data-ttype="playwright" style="display:none">E2E</button>
        <button class="fbtn all" data-ttype="jest" style="display:none">Unit</button>
        <button class="fbtn all" data-ttype="newman" style="display:none">API</button>
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th class="sortable" data-col="project">Project</th>
          <th class="sortable" data-col="test">Test</th>
          <th class="sortable" data-col="browser">Browser</th>
          <th class="sortable" data-col="status">Status</th>
          <th class="sortable" data-col="duration">Duration</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="fcount" id="fcount"></span>
      <div class="pagination-pages" id="pagination-pages"></div>
      <div class="page-size-wrap">
        <label class="fcount" for="page-size">Rows</label>
        <select id="page-size" class="page-size-select">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span class="ft" id="footer-l"></span>
    <span class="ft">qa hub · auto-generated</span>
  </footer>
</main>

<!-- ── Test detail side panel ──────────────────────────────────────────────── -->
<div class="panel-backdrop" id="panel-backdrop"></div>
<aside class="detail-panel" id="detail-panel" aria-hidden="true">
  <div class="dp-head">
    <div class="dp-title" id="dp-title"></div>
    <button class="dp-close" id="dp-close" aria-label="Close">✕</button>
  </div>
  <div class="dp-meta-bar" id="dp-meta-bar"></div>
  <div class="dp-file-bar" id="dp-file-bar"></div>
  <div class="dp-tabs" id="dp-tabs">
    <button class="dp-tab active" data-tab="steps">Steps</button>
    <button class="dp-tab" data-tab="history">History</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</aside>

<script>
const { projects, global } = /*%%DATA%%*/null;
const history = /*%%HISTORY%%*/null;

if (history) {
  for (const k of Object.keys(history)) {
    const byDay = new Map();
    for (const r of history[k]) {
      const d = new Date(r.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (!byDay.has(d)) {
        byDay.set(d, { ...r, _count: 1, stats: { ...r.stats } });
      } else {
        const acc = byDay.get(d);
        acc.duration += r.duration;
        acc.stats.total += r.stats.total;
        acc.stats.expected += r.stats.expected;
        acc.stats.unexpected += r.stats.unexpected;
        acc.stats.flaky += r.stats.flaky;
        acc.stats.skipped += r.stats.skipped;
        acc._count++;
        if (r.date > acc.date) acc.date = r.date;
      }
    }
    history[k] = Array.from(byDay.values()).map(acc => {
      acc.duration /= acc._count;
      acc.stats.total /= acc._count;
      acc.stats.expected /= acc._count;
      acc.stats.unexpected /= acc._count;
      acc.stats.flaky /= acc._count;
      acc.stats.skipped /= acc._count;
      return acc;
    }).sort((a,b) => a.date - b.date);
  }
}

const fmtDur  = ms => ms >= 1000 ? (ms/1000).toFixed(2)+'s' : ms+'ms';
const fmtDate = ts => new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
const timeAgo = ts => {
  const diff = Date.now() - ts;
  const s = Math.floor(diff/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 30) return fmtDate(ts);
  if (d >= 1)  return d + (d===1?' day':' days') + ' ago';
  if (h >= 1)  return h + (h===1?' hour':' hours') + ' ago';
  if (m >= 1)  return m + (m===1?' minute':' minutes') + ' ago';
  return 'just now';
};
const browserColor = { chromium:'#1a56a0', firefox:'#b54800', webkit:'#5c3080', unit:'#2d7a4f', api:'#ff6c37' };
const chipMap   = { expected:'pass', unexpected:'fail', flaky:'flaky', skipped:'skip' };
const chipLabel = { expected:'Passed', unexpected:'Failed', flaky:'Flaky', skipped:'Skipped' };

const now = Date.now();
document.getElementById('gen-date').textContent = 'generated ' + fmtDate(now);
if (!global.ok) {
  const p = document.getElementById('global-pill');
  p.className = 'pill fail';
  document.getElementById('pill-text').textContent = 'Failures detected';
}

document.getElementById('gstats').innerHTML = [
  { cls:'',   label:'Total',   val: global.total },
  { cls:'p',  label:'Passed',  val: global.expected },
  { cls:'f',  label:'Failed',  val: global.unexpected },
  { cls:'fl', label:'Flaky',   val: global.flaky },
  { cls:'',   label:'Skipped', val: global.skipped },
].map(s => '<div class="gc '+s.cls+'"><div class="gn">'+s.val+'</div><div class="gl">'+s.label+'</div></div>').join('');

document.getElementById('footer-l').textContent = projects.length + ' project' + (projects.length!==1?'s':'') + ' · ' + global.total + ' tests total';

if (projects.length === 0) {
  document.getElementById('cards').innerHTML =
    '<div class="empty-state"><div class="empty-icon">🧪</div><div class="empty-title">No projects yet</div><div class="empty-sub">Upload a Playwright or Jest JSON report from one of your repos to see results here.</div></div>';
} else {
  document.getElementById('cards').innerHTML = projects.map(p => {
    const passRate = p.stats.total ? ((p.stats.expected / p.stats.total)*100).toFixed(0) : 0;
    const barColor = p.stats.ok ? '#2d6a3f' : '#8b2020';
    const browsers = p.projectNames.map(b => {
      const c = browserColor[b] || '#888';
      return '<span class="bchip"><span class="bdot" style="background:'+c+'"></span>'+b+'</span>';
    }).join('');
    const typeLabel = p.type === 'playwright' ? 'E2E' : p.type === 'newman' ? 'API' : 'Unit';
    return '<a class="card-link" href="projects/'+encodeURIComponent(p.name)+'.html"><div class="card" data-type="'+p.type+'">'
      + '<div class="card-header">'
      + '<div><div class="card-name">'+p.name+'</div>'
      + '<div class="card-date" title="'+fmtDate(p.startTime)+'">'+timeAgo(p.startTime)+'<span class="tip-icon">i</span></div></div>'
      + '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0"><span class="type-badge type-badge--'+p.type+'">'+typeLabel+'</span><span class="pill '+(p.stats.ok?'ok':'fail')+'"><span class="dot"></span>'+(p.stats.ok?'Passed':'Failed')+'</span></div>'
      + '</div>'
      + '<div class="card-stats">'
      + '<div class="cs"><div class="cs-l">Total</div><div class="cs-n">'+p.stats.total+'</div></div>'
      + '<div class="cs p"><div class="cs-l">Passed</div><div class="cs-n">'+p.stats.expected+'</div></div>'
      + '<div class="cs f"><div class="cs-l">Failed</div><div class="cs-n">'+p.stats.unexpected+'</div></div>'
      + '<div class="cs fl"><div class="cs-l">Flaky</div><div class="cs-n">'+p.stats.flaky+'</div></div>'
      + '</div>'
      + '<div class="progress-track"><div class="progress-fill" style="width:'+passRate+'%;background:'+barColor+'"></div></div>'
      + '<div class="progress-label"><span>'+p.stats.expected+'/'+p.stats.total+' passed</span><span style="color:'+(p.stats.ok?'var(--pass)':'var(--fail)')+'">'+passRate+'%</span></div>'
      + '<div class="browsers">'+browsers+'</div>'
      + '</div></a>';
  }).join('');

  // Show type filter only when both types are present
  const hasPlaywright = projects.some(p => p.type === 'playwright');
  const hasJest       = projects.some(p => p.type === 'jest');
  if (hasPlaywright && hasJest) {
    document.getElementById('card-type-filter').style.display = 'flex';
    document.getElementById('type-sep').style.display = '';
    document.querySelectorAll('[data-ttype]').forEach(el => el.style.display = '');
  }
}

const allTests = projects.flatMap(p => p.tests.map(t => ({ ...t, projectName: p.name, projectType: p.type })));

document.getElementById('tbody').innerHTML = allTests.map((t, idx) => {
  const bColor = browserColor[t.project] || '#888';
  const cls    = chipMap[t.outcome]   || 'skip';
  const lbl    = chipLabel[t.outcome] || t.outcome;
  return '<tr data-outcome="'+t.outcome+'" data-project="'+t.projectName+'" data-test="'+t.title+'" data-browser="'+t.project+'" data-status="'+(chipLabel[t.outcome]||t.outcome)+'" data-duration="'+t.duration+'" data-type="'+t.projectType+'" data-idx="'+idx+'" class="clickable-row">'
    + '<td><span class="dur">'+t.projectName+'</span></td>'
    + '<td><div class="tt">'+t.title+'</div><div class="tf">'+t.file+':'+t.line+'</div></td>'
    + '<td><span class="bchip"><span class="bdot" style="background:'+bColor+'"></span>'+t.project+'</span></td>'
    + '<td><span class="chip '+cls+'">'+lbl+'</span></td>'
    + '<td><span class="dur">'+fmtDur(t.duration)+'</span></td>'
    + '</tr>';
}).join('');

// ── Filter / Sort / Paginate ──────────────────────────────────────────────────

let activeFilter     = 'all';
let activeTypeFilter = 'all';
let sortCol          = null;
let sortDir      = 1;
let currentPage  = 1;
let pageSize     = 25;

function getFilteredSorted() {
  let rows = [...document.querySelectorAll('#tbody tr')];

  // Filter
  rows = rows.filter(r => activeFilter === 'all' || r.dataset.outcome === activeFilter);
  rows = rows.filter(r => activeTypeFilter === 'all' || r.dataset.type === activeTypeFilter);

  // Sort
  if (sortCol) {
    rows.sort((a, b) => {
      let av = a.dataset[sortCol] || '';
      let bv = b.dataset[sortCol] || '';
      if (sortCol === 'duration') return (Number(av) - Number(bv)) * sortDir;
      return av.localeCompare(bv) * sortDir;
    });
  }

  return rows;
}

function updateTable() {
  const allRows      = [...document.querySelectorAll('#tbody tr')];
  const filtered     = getFilteredSorted();
  const totalVisible = filtered.length;
  const totalPages   = Math.max(1, Math.ceil(totalVisible / pageSize));

  // Clamp page
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * pageSize;
  const end   = start + pageSize;
  const pageRows = new Set(filtered.slice(start, end));

  // Re-order DOM to match sort, then show/hide
  const tbody = document.getElementById('tbody');
  filtered.forEach(r => tbody.appendChild(r));
  allRows.forEach(r => r.classList.toggle('hidden', !pageRows.has(r)));

  // Count label
  const from = totalVisible === 0 ? 0 : start + 1;
  const to   = Math.min(end, totalVisible);
  document.getElementById('fcount').textContent =
    totalVisible === 0 ? '0 tests' : from + '–' + to + ' of ' + totalVisible + ' tests';

  // Pagination controls
  const pag = document.getElementById('pagination-pages');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '<button class="pbtn" data-page="'+(currentPage-1)+'" '+(currentPage===1?'disabled':'')+'>‹</button>';

  // Page number buttons — show up to 7 with ellipsis
  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push('…');
    for (let i = Math.max(2, currentPage-1); i <= Math.min(totalPages-1, currentPage+1); i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push('…');
    pages.push(totalPages);
  }

  pages.forEach(p => {
    if (p === '…') {
      html += '<span class="pellipsis">…</span>';
    } else {
      html += '<button class="pbtn'+(p===currentPage?' active':'')+'" data-page="'+p+'">'+p+'</button>';
    }
  });

  html += '<button class="pbtn" data-page="'+(currentPage+1)+'" '+(currentPage===totalPages?'disabled':'')+'>›</button>';
  pag.innerHTML = html;
}

document.getElementById('filter-btns').addEventListener('click', e => {
  const btn = e.target.closest('.fbtn');
  if (!btn) return;
  if (btn.dataset.filter !== undefined) {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } else if (btn.dataset.ttype !== undefined) {
    activeTypeFilter = btn.dataset.ttype;
    document.querySelectorAll('[data-ttype]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  currentPage = 1;
  updateTable();
});

document.getElementById('card-type-filter').addEventListener('click', e => {
  const btn = e.target.closest('.fbtn');
  if (!btn) return;
  const type = btn.dataset.type;
  document.querySelectorAll('#card-type-filter .fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#cards .card-link').forEach(link => {
    const type2 = link.querySelector('.card').dataset.type;
    link.classList.toggle('hidden', type !== 'all' && type2 !== type);
  });
});

document.getElementById('page-size').addEventListener('change', e => {
  pageSize    = Number(e.target.value);
  currentPage = 1;
  updateTable();
});

document.getElementById('pagination-pages').addEventListener('click', e => {
  const btn = e.target.closest('.pbtn');
  if (!btn || btn.disabled) return;
  currentPage = Number(btn.dataset.page);
  updateTable();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir *= -1;
      th.className = 'sortable sort-' + (sortDir === 1 ? 'asc' : 'desc');
    } else {
      document.querySelectorAll('th.sortable').forEach(t => t.className = 'sortable');
      sortCol = col;
      sortDir = 1;
      th.className = 'sortable sort-asc';
    }
    currentPage = 1;
    updateTable();
  });
});

updateTable();

// ── Test detail panel ─────────────────────────────────────────────────────────
(function () {
  const panel      = document.getElementById('detail-panel');
  const backdrop   = document.getElementById('panel-backdrop');
  const dpTitle    = document.getElementById('dp-title');
  const dpMetaBar  = document.getElementById('dp-meta-bar');
  const dpFileBar  = document.getElementById('dp-file-bar');
  const dpTabs     = document.getElementById('dp-tabs');
  const dpBody     = document.getElementById('dp-body');

  const CHIP_CLS     = { expected:'pass', unexpected:'fail', flaky:'flaky', skipped:'skip' };
  const CHIP_LABEL   = { expected:'Passed', unexpected:'Failed', flaky:'Flaky', skipped:'Skipped' };
  const OUTCOME_ICON = { expected:'✓', unexpected:'✗', flaky:'⚡', skipped:'—' };
  const fmtD = ms => ms >= 1000 ? (ms/1000).toFixed(2)+'s' : ms+'ms';
  const esc  = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let currentTest = null;
  let currentHist = [];
  let dpChart     = null;

  function getTestHistory(t) {
    const src = history[t.projectName] ?? [];
    return src
      .filter(e => e.tests)
      .map(e => {
        const m = e.tests.find(h => h.title === t.title && h.project === t.project);
        return m ? { date: e.date, duration: m.duration, outcome: m.outcome } : null;
      })
      .filter(Boolean);
  }

  function openPanel(t) {
    currentTest = t;
    currentHist = getTestHistory(t);

    dpTitle.textContent = t.title;

    const cls    = CHIP_CLS[t.outcome] || 'skip';
    const bColor = browserColor[t.project] || '#888';
    dpMetaBar.innerHTML =
        '<span class="chip ' + cls + '">' + OUTCOME_ICON[t.outcome] + ' ' + (CHIP_LABEL[t.outcome] || t.outcome) + '</span>'
      + '<span class="dp-meta-item">⏱ ' + fmtD(t.duration) + '</span>'
      + '<span class="bchip"><span class="bdot" style="background:' + bColor + '"></span>' + esc(t.project) + '</span>';

    dpFileBar.innerHTML =
        '<span class="dp-file-path">' + esc(t.file) + ':' + t.line + '</span>'
      + '<button class="dp-copy-btn" id="dp-copy" title="Copy path">⧉</button>';
    document.getElementById('dp-copy').addEventListener('click', () => {
      navigator.clipboard.writeText(t.file + ':' + t.line).catch(() => {});
    }, { once: true });

    panel.classList.add('open');
    panel.setAttribute('aria-hidden', 'false');
    backdrop.classList.add('visible');
    document.body.classList.add('panel-open');
    setTab('steps');
  }

  function setTab(tab) {
    dpTabs.querySelectorAll('.dp-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    if (tab === 'steps') renderSteps();
    else renderHistory();
  }

  function renderSteps() {
    const t = currentTest;
    if (t.steps && t.steps.length > 0) {
      let html = '<div class="dp-steps">';
      t.steps.forEach((s, i) => {
        const fail = !!s.error;
        html += '<div class="dp-step' + (fail ? ' dp-step--fail' : '') + '">'
          + '<span class="step-num">' + (i + 1) + '</span>'
          + '<span class="step-title" title="' + esc(s.title) + '">' + esc(s.title) + '</span>'
          + '<span class="step-dur">' + fmtD(s.duration) + '</span>'
          + '<span class="' + (fail ? 'step-fail' : 'step-pass') + '">' + (fail ? '✗' : '✓') + '</span>'
          + '</div>';
        if (fail && s.error) html += '<div class="step-err-row">' + esc(s.error) + '</div>';
      });
      dpBody.innerHTML = html + '</div>';
    } else if (t.error) {
      dpBody.innerHTML = '<div class="dp-tab-body">'
        + '<div class="dp-section"><div class="dp-section-title">Error</div><pre class="dp-error">' + esc(t.error) + '</pre></div>'
        + (t.errorStack ? '<details class="dp-details"><summary class="dp-section-title">Stack Trace</summary><pre class="dp-stack">' + esc(t.errorStack) + '</pre></details>' : '')
        + '</div>';
    } else {
      dpBody.innerHTML = '<div class="dp-empty-tab">No steps recorded for this test</div>';
    }
  }

  function renderHistory() {
    if (dpChart) { dpChart.destroy(); dpChart = null; }
    const hist = currentHist;
    if (hist.length < 2) {
      dpBody.innerHTML = '<div class="dp-empty-tab">Not enough history yet.<br>Run the tests a few more times to see trends.</div>';
      return;
    }
    const avgDur = Math.round(hist.reduce((s, r) => s + r.duration, 0) / hist.length);
    const passed = hist.filter(r => r.outcome === 'expected').length;
    const failed = hist.filter(r => r.outcome !== 'expected' && r.outcome !== 'skipped').length;
    dpBody.innerHTML = '<div class="dp-tab-body">'
      + '<div class="dp-hist-hdr">'
      + '<div><div class="dp-hist-title">Test Execution History</div><div class="dp-hist-sub">Track test duration and status trends over time</div></div>'
      + '<div class="dp-hist-stats">'
      + '<div><div class="dp-hist-stat-lbl">Avg Duration</div><div class="dp-hist-stat-val">' + fmtD(avgDur) + '</div></div>'
      + '<div><div class="dp-hist-stat-lbl">Passed</div><div class="dp-hist-stat-val pass">' + passed + '</div></div>'
      + '<div><div class="dp-hist-stat-lbl">Failed</div><div class="dp-hist-stat-val fail">' + failed + '</div></div>'
      + '</div></div>'
      + '<canvas id="dp-hist-canvas" height="180"></canvas>'
      + '</div>';
    if (typeof Chart !== 'undefined') {
      const labels      = hist.map(r => new Date(r.date).toLocaleDateString('en-US', { month:'short', day:'numeric' }));
      const pointColors = hist.map(r => r.outcome === 'expected' ? '#2d6a3f' : '#8b2020');
      dpChart = new Chart(document.getElementById('dp-hist-canvas'), {
        type: 'line',
        data: {
          labels,
          datasets: [{ data: hist.map(r => r.duration),
            borderColor: '#1a56a0', backgroundColor: '#1a56a010',
            pointBackgroundColor: pointColors, pointBorderColor: pointColors,
            tension: 0.3, pointRadius: 4, fill: true }],
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#e4dfd7' }, ticks: { maxTicksLimit: 8, font: { size: 9 } } },
            y: { grid: { color: '#e4dfd7' }, beginAtZero: false,
              ticks: { callback: v => v >= 1000 ? (v/1000).toFixed(1)+'s' : v+'ms', font: { size: 9 } } },
          },
        },
      });
    }
  }

  function closePanel() {
    panel.classList.remove('open');
    panel.setAttribute('aria-hidden', 'true');
    backdrop.classList.remove('visible');
    document.body.classList.remove('panel-open');
    if (dpChart) { dpChart.destroy(); dpChart = null; }
  }

  dpTabs.addEventListener('click', e => {
    const btn = e.target.closest('.dp-tab');
    if (btn) setTab(btn.dataset.tab);
  });
  document.getElementById('dp-close').addEventListener('click', closePanel);
  backdrop.addEventListener('click', closePanel);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
  document.getElementById('tbody').addEventListener('click', e => {
    const row = e.target.closest('tr[data-idx]');
    if (!row) return;
    const t = allTests[Number(row.dataset.idx)];
    if (t) openPanel(t);
  });
})();

// ── Charts ────────────────────────────────────────────────────────────────────

function initCharts() {
  if (typeof Chart === 'undefined') return;

  Chart.defaults.font.family = "'DM Mono', 'Courier New', monospace";
  Chart.defaults.font.size   = 10;
  Chart.defaults.color       = '#6b6560';

  const gridColor = '#e4dfd7';
  const baseScales = {
    x: { grid: { color: gridColor }, ticks: { maxTicksLimit: 8 } },
    y: { grid: { color: gridColor }, beginAtZero: true },
  };
  const fmt = ts => new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const palette = ['#1a56a0','#2d6a3f','#b54800','#5c3080','#7a5c10','#8b2020'];

  // ── Trend charts (only when history has ≥ 1 data points for any project) ────
  const histKeys = history ? Object.keys(history).filter(k => (history[k]?.length ?? 0) >= 1) : [];
  if (histKeys.length > 0) {
    document.getElementById('trends-sl').style.display = '';
    document.getElementById('trends-grid').style.display = '';

    // Extract unified sorted string dates for x-axis
    const strToTs = new Map();
    histKeys.forEach(k => history[k].forEach(s => {
      const d = fmt(s.date);
      if (!strToTs.has(d) || s.date < strToTs.get(d)) strToTs.set(d, s.date);
    }));
    const labels = [...strToTs.keys()].sort((a,b) => strToTs.get(a) - strToTs.get(b));

    const getDataMap = (name, extractor) => {
      const map = new Map(history[name].map(s => [fmt(s.date), extractor(s)]));
      return labels.map(lbl => map.has(lbl) ? map.get(lbl) : null);
    };

    // Pass Rate Trend
    const prEl = document.getElementById('chart-passrate');
    if (prEl) {
      new Chart(prEl, {
        type: 'line',
        data: {
          labels,
          datasets: histKeys.map((name, i) => ({
            label: name,
            data: getDataMap(name, s => s.stats.total > 0 ? +((s.stats.expected / s.stats.total) * 100).toFixed(1) : 0),
            borderColor: palette[i % palette.length],
            backgroundColor: palette[i % palette.length] + '18',
            tension: 0.35, pointRadius: 3, fill: false,
            spanGaps: true
          })),
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: {
            legend: { display: histKeys.length > 1, position: 'bottom',
              labels: { boxWidth: 10, font: { size: 10 } } },
          },
          scales: {
            x: baseScales.x,
            y: { ...baseScales.y, max: 100, ticks: { callback: v => v + '%' } },
          },
        },
      });
    }

    // Duration Trend
    const durEl = document.getElementById('chart-duration');
    if (durEl) {
      new Chart(durEl, {
        type: 'line',
        data: {
          labels,
          datasets: histKeys.map((name, i) => ({
            label: name,
            data: getDataMap(name, s => s.duration),
            borderColor: palette[i % palette.length],
            backgroundColor: palette[i % palette.length] + '18',
            tension: 0.35, pointRadius: 3, fill: false,
            spanGaps: true
          })),
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: {
            legend: { display: histKeys.length > 1, position: 'bottom',
              labels: { boxWidth: 10, font: { size: 10 } } },
          },
          scales: {
            x: baseScales.x,
            y: { ...baseScales.y,
              ticks: { callback: v => v >= 1000 ? (v/1000).toFixed(1)+'s' : v+'ms' } },
          },
        },
      });
    }
  }

  // ── Flaky Tests Ranking ───────────────────────────────────────────────────────
  const flakyEl = document.getElementById('chart-flaky');
  if (flakyEl) {
    const flakyCount = {};
    for (const p of projects) {
      for (const t of p.tests) {
        if (t.outcome === 'flaky') flakyCount[t.title] = (flakyCount[t.title] ?? 0) + 1;
      }
    }
    const top5 = Object.entries(flakyCount).sort((a,b) => b[1]-a[1]).slice(0,5);
    if (top5.length > 0) {
      new Chart(flakyEl, {
        type: 'bar',
        data: {
          labels: top5.map(([t]) => t.length > 32 ? t.slice(0,30)+'…' : t),
          datasets: [{ data: top5.map(([,c]) => c),
            backgroundColor: '#fdf6e3', borderColor: '#7a5c10', borderWidth: 1 }],
        },
        options: {
          responsive: true, maintainAspectRatio: true, indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: { x: { ...baseScales.x, ticks: { stepSize: 1 } },
            y: { grid: { display: false } } },
        },
      });
    } else {
      flakyEl.closest('.chart-card').innerHTML =
        '<div class="chart-title">Top 5 Flaky Tests</div>'
        + '<div class="chart-empty">No flaky tests detected</div>';
    }
  }

  // ── Slowest Tests Ranking ─────────────────────────────────────────────────────
  const slowEl = document.getElementById('chart-slowest');
  if (slowEl) {
    const allTests = projects.flatMap(p => p.tests.filter(t => t.duration > 0));
    const top5 = [...allTests].sort((a,b) => b.duration - a.duration).slice(0,5);
    if (top5.length > 0) {
      new Chart(slowEl, {
        type: 'bar',
        data: {
          labels: top5.map(t => t.title.length > 32 ? t.title.slice(0,30)+'…' : t.title),
          datasets: [{ data: top5.map(t => t.duration),
            backgroundColor: '#fdf0f0', borderColor: '#8b2020', borderWidth: 1 }],
        },
        options: {
          responsive: true, maintainAspectRatio: true, indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { ...baseScales.x,
              ticks: { callback: v => v >= 1000 ? (v/1000).toFixed(1)+'s' : v+'ms' } },
            y: { grid: { display: false } },
          },
        },
      });
    } else {
      slowEl.closest('.chart-card').innerHTML =
        '<div class="chart-title">Top 5 Slowest Tests</div>'
        + '<div class="chart-empty">No duration data</div>';
    }
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initCharts);
} else {
  initCharts();
}

// ── Reliability Heatmap (project × run) ──────────────────────────────────────

function buildHeatmap() {
  if (!history) return;
  const histKeys = Object.keys(history).filter(k => (history[k]?.length ?? 0) >= 1);
  if (histKeys.length === 0) return;

  document.getElementById('heatmap-sl').style.display = '';
  const wrap = document.getElementById('heatmap-wrap');
  wrap.style.display = '';

  const fmtD = ts => new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const strToTs = new Map();
  histKeys.forEach(k => history[k].forEach(s => {
    const d = fmtD(s.date);
    if (!strToTs.has(d) || s.date < strToTs.get(d)) strToTs.set(d, s.date);
  }));
  const allLabels = [...strToTs.keys()].sort((a,b) => strToTs.get(a) - strToTs.get(b));

  let html = '<div class="heatmap-section">';
  html += `<div class="heatmap-grid" style="grid-template-columns:160px repeat(${allLabels.length},13px)">`;

  // Header row: corner + date labels (vertical)
  html += '<div class="hm-corner"></div>';
  allLabels.forEach(lbl => {
    html += '<div class="hm-date-lbl" title="' + lbl + '">' + lbl + '</div>';
  });

  // One row per project
  histKeys.forEach(name => {
    const dateMap = new Map(history[name].map(e => [fmtD(e.date), e]));
    const trunc = name.length > 28 ? name.slice(0, 26) + '…' : name;
    html += '<div class="hm-row-label" title="' + name + '">' + trunc + '</div>';
    allLabels.forEach(lbl => {
      const e = dateMap.get(lbl);
      if (!e) {
        html += '<div class="hm-cell hm-none" title="' + name + ' · ' + lbl + ' · No data"></div>';
        return;
      }
      const pct = e.stats.total > 0 ? ((e.stats.expected / e.stats.total) * 100).toFixed(0) : 100;
      const cls = e.stats.unexpected > 0 ? 'hm-fail' : e.stats.flaky > 0 ? 'hm-flaky' : 'hm-pass';
      html += '<div class="hm-cell ' + cls + '" title="' + name + ' · ' + lbl + ' · ' + pct + '% passed"></div>';
    });
  });

  html += '</div>'; // heatmap-grid
  html += '<div class="hm-sub">Each column = one CI run. Newest run on the right.</div>';
  html += '<div class="hm-legend">'
    + '<div class="hm-legend-item"><div class="hm-legend-swatch hm-pass"></div>All passed</div>'
    + '<div class="hm-legend-item"><div class="hm-legend-swatch hm-flaky"></div>Flaky only</div>'
    + '<div class="hm-legend-item"><div class="hm-legend-swatch hm-fail"></div>Failures</div>'
    + '<div class="hm-legend-item"><div class="hm-legend-swatch hm-none"></div>No data</div>'
    + '</div>';
  html += '</div>'; // heatmap-section

  wrap.innerHTML = html;
}

buildHeatmap();
</script>
</body>
</html>
