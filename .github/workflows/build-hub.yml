name: Build QA Hub Dashboard

on:
  # Triggers whenever a project pushes its latest.json into projects/
  push:
    branches: [ main ]
    paths:
      - 'projects/*/latest.json'
      - 'scripts/**'

  # Allow manual runs from the Actions tab
  workflow_dispatch:

  # Allow remote triggers from other repositories
  repository_dispatch:
    types: [test-hub-trigger]

permissions:
  contents: write
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3️⃣ Generate the combined dashboard from all projects/*/latest.json files
      - name: Generate combined dashboard
        run: node scripts/build.mjs

      # 4️⃣ Persist history updates in the repository
      - name: Commit history updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history/*.json
          # Check if there are changes to avoid failing the build
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update test history [skip ci]"
            git push origin main
          else
            echo "No history changes to commit."
          fi

      # 4️⃣ Upload dist/ as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 5️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4